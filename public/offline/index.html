<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | Swapnil Biswas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Public Sans', system-ui, sans-serif;
      background: #090b11;
      color: #c3cadb;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 420px; }
    h1 {
      font-family: 'Rubik', sans-serif;
      font-size: 2rem;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #7611a6, #c561f6);
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F50C;</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Previously visited pages may still be available.</p>
    <a href="/" onclick="window.location.reload(); return false;">Try Again</a>
  </div>
</body>
</html>
