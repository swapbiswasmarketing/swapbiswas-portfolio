<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="600" fill="url(#bg)" rx="24"/>
  <text x="700" y="64" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="36" font-weight="700">The Customer Onboarding Template: 7 Stages, 3 Phases</text>
  <text x="700" y="102" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="21">Every stage gets an owner, a milestone, and a deadline</text>

  <!-- Phase 1 -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="150" width="410" height="390" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="40" y="150" width="410" height="6" rx="3" fill="#f5a0a1"/>
    <text x="70" y="196" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="19" font-weight="700" letter-spacing="0.08em">PHASE 1 &#183; DAY 0-10</text>
    <text x="70" y="236" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="27" font-weight="700">Setup &amp; Foundation</text>
    <text x="70" y="284" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Job</text>
    <text x="70" y="312" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">Remove friction, prove nothing yet.</text>
    <text x="70" y="360" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Stages</text>
    <text x="70" y="390" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">1. Welcome &amp; kickoff</text>
    <text x="70" y="418" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">2. Account setup</text>
    <text x="70" y="446" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">3. Data &amp; integrations</text>
    <text x="70" y="506" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-style="italic">Owner: CS + Implementation</text>
  </g>

  <line x1="450" y1="345" x2="487" y2="345" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="481,339 493,345 481,351" fill="#5eead4"/>

  <!-- Phase 2 -->
  <g filter="url(#cardShadow)">
    <rect x="495" y="150" width="410" height="390" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="495" y="150" width="410" height="6" rx="3" fill="#c084fc"/>
    <text x="525" y="196" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="700" letter-spacing="0.08em">PHASE 2 &#183; DAY 5-14</text>
    <text x="525" y="236" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="27" font-weight="700">First Value</text>
    <text x="525" y="284" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Job</text>
    <text x="525" y="312" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">Hit the first real outcome.</text>
    <text x="525" y="360" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Stages</text>
    <text x="525" y="390" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">4. Activation milestone</text>
    <text x="525" y="436" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600">This stage predicts retention.</text>
    <text x="525" y="506" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-style="italic">Owner: CS / Product</text>
  </g>

  <line x1="905" y1="345" x2="942" y2="345" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="936,339 948,345 936,351" fill="#5eead4"/>

  <!-- Phase 3 -->
  <g filter="url(#cardShadow)">
    <rect x="950" y="150" width="410" height="390" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="950" y="150" width="410" height="6" rx="3" fill="#5eead4"/>
    <text x="980" y="196" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="19" font-weight="700" letter-spacing="0.08em">PHASE 3 &#183; DAY 7-60</text>
    <text x="980" y="236" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="27" font-weight="700">Adopted &amp; Handed Off</text>
    <text x="980" y="284" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Job</text>
    <text x="980" y="312" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">Turn one win into a habit.</text>
    <text x="980" y="360" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Stages</text>
    <text x="980" y="390" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">5. Training &amp; enablement</text>
    <text x="980" y="418" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">6. Adoption &amp; expansion</text>
    <text x="980" y="446" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="20">7. Handoff to success</text>
    <text x="980" y="506" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="19" font-style="italic">Owner: CS / AM</text>
  </g>
</svg>
