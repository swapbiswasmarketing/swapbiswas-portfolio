<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" fill="none">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ca7879"/>
      <stop offset="50%" stop-color="#7611a6"/>
      <stop offset="100%" stop-color="#e05d22"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" rx="16" fill="url(#bgGrad)"/>
  <rect width="900" height="420" rx="16" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Grid lines -->
  <line x1="80" y1="340" x2="860" y2="340" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="270" x2="860" y2="270" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="200" x2="860" y2="200" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="130" x2="860" y2="130" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="60" x2="860" y2="60" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis label -->
  <text x="20" y="200" fill="#7d8590" font-family="system-ui, sans-serif" font-size="11" transform="rotate(-90, 20, 200)" text-anchor="middle" letter-spacing="0.1em">AI IMPACT</text>

  <!-- X-axis label -->
  <text x="470" y="400" fill="#7d8590" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" letter-spacing="0.1em">ADOPTION JOURNEY</text>

  <!-- Curve path (staircase with smooth corners) -->
  <path d="M 120 320 C 140 320, 150 300, 170 300 L 260 300 C 280 300, 290 250, 310 250 L 420 250 C 440 250, 450 180, 470 180 L 570 180 C 590 180, 600 110, 620 110 L 710 110 C 730 110, 740 55, 760 55 L 840 55" stroke="url(#curveGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>

  <!-- Area fill under curve -->
  <path d="M 120 320 C 140 320, 150 300, 170 300 L 260 300 C 280 300, 290 250, 310 250 L 420 250 C 440 250, 450 180, 470 180 L 570 180 C 590 180, 600 110, 620 110 L 710 110 C 730 110, 740 55, 760 55 L 840 55 L 840 340 L 120 340 Z" fill="url(#curveGrad)" opacity="0.06"/>

  <!-- Stage dots -->
  <circle cx="120" cy="320" r="6" fill="#ca7879" filter="url(#glow)"/>
  <circle cx="280" cy="300" r="6" fill="#b34a7e" filter="url(#glow)"/>
  <circle cx="450" cy="250" r="6" fill="#7611a6" filter="url(#glow)"/>
  <circle cx="620" cy="180" r="6" fill="#9c3764" filter="url(#glow)"/>
  <circle cx="800" cy="110" r="6" fill="#e05d22" filter="url(#glow)"/>

  <!-- Inner dots -->
  <circle cx="120" cy="320" r="2.5" fill="#fff"/>
  <circle cx="280" cy="300" r="2.5" fill="#fff"/>
  <circle cx="450" cy="250" r="2.5" fill="#fff"/>
  <circle cx="620" cy="180" r="2.5" fill="#fff"/>
  <circle cx="800" cy="110" r="2.5" fill="#fff"/>

  <!-- Stage 1 -->
  <text x="120" y="355" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Stage 1</text>
  <text x="120" y="372" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">AI-Curious</text>

  <!-- Stage 2 -->
  <text x="280" y="355" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Stage 2</text>
  <text x="280" y="372" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Experimenter</text>

  <!-- Stage 3 -->
  <text x="450" y="355" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Stage 3</text>
  <text x="450" y="372" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Integrated</text>

  <!-- Stage 4 -->
  <text x="620" y="355" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Stage 4</text>
  <text x="620" y="372" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Optimized</text>

  <!-- Stage 5 -->
  <text x="800" y="355" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Stage 5</text>
  <text x="800" y="372" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">AI-Native</text>

  <!-- "Most teams here" marker -->
  <rect x="320" y="218" width="110" height="22" rx="11" fill="#7611a6" opacity="0.2"/>
  <rect x="320" y="218" width="110" height="22" rx="11" stroke="#7611a6" stroke-width="1" fill="none" opacity="0.5"/>
  <text x="375" y="233" fill="#c3cadb" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Most teams here</text>
  <line x1="375" y1="240" x2="375" y2="250" stroke="#7611a6" stroke-width="1" opacity="0.5"/>

  <!-- Title -->
  <text x="470" y="32" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="-0.02em">The Marketer's AI Maturity Curve</text>
</svg>
