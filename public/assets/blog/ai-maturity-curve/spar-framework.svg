<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" fill="none">
  <defs>
    <linearGradient id="sparBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ca7879"/>
      <stop offset="100%" stop-color="#b34a7e"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7611a6"/>
      <stop offset="100%" stop-color="#5b0d80"/>
    </linearGradient>
    <linearGradient id="aGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="rGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e05d22"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="16" fill="url(#sparBg)"/>
  <rect width="900" height="340" rx="16" stroke="#30363d" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="450" y="38" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="-0.02em">The SPAR Framework</text>
  <text x="450" y="58" fill="#7d8590" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle">A practical framework to advance one stage at a time</text>

  <!-- Connector arrows -->
  <line x1="232" y1="175" x2="248" y2="175" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="248,171 256,175 248,179" fill="#30363d"/>
  <line x1="442" y1="175" x2="458" y2="175" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="458,171 466,175 458,179" fill="#30363d"/>
  <line x1="652" y1="175" x2="668" y2="175" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="668,171 676,175 668,179" fill="#30363d"/>

  <!-- S Card -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="85" width="192" height="180" rx="12" fill="#0d1117"/>
    <rect x="40" y="85" width="192" height="180" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>
    <rect x="40" y="85" width="192" height="4" rx="2" fill="url(#sGrad)"/>
    <circle cx="136" cy="130" r="24" fill="#ca7879" opacity="0.12"/>
    <text x="136" y="138" fill="#ca7879" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">S</text>
    <text x="136" y="170" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Standardize</text>
    <text x="136" y="192" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Pick your tools.</text>
    <text x="136" y="206" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Document processes.</text>
    <text x="136" y="220" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Create prompt libraries.</text>
    <text x="136" y="248" fill="#7d8590" font-family="system-ui, sans-serif" font-size="9" font-style="italic" text-anchor="middle">Shared AI playbook</text>
  </g>

  <!-- P Card -->
  <g filter="url(#cardShadow)">
    <rect x="250" y="85" width="192" height="180" rx="12" fill="#0d1117"/>
    <rect x="250" y="85" width="192" height="180" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>
    <rect x="250" y="85" width="192" height="4" rx="2" fill="url(#pGrad)"/>
    <circle cx="346" cy="130" r="24" fill="#7611a6" opacity="0.12"/>
    <text x="346" y="138" fill="#7611a6" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">P</text>
    <text x="346" y="170" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Process</text>
    <text x="346" y="192" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Build AI into existing</text>
    <text x="346" y="206" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">workflows. Don't create</text>
    <text x="346" y="220" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">parallel processes.</text>
    <text x="346" y="248" fill="#7d8590" font-family="system-ui, sans-serif" font-size="9" font-style="italic" text-anchor="middle">Map + automate 3 steps</text>
  </g>

  <!-- A Card -->
  <g filter="url(#cardShadow)">
    <rect x="460" y="85" width="192" height="180" rx="12" fill="#0d1117"/>
    <rect x="460" y="85" width="192" height="180" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>
    <rect x="460" y="85" width="192" height="4" rx="2" fill="url(#aGrad)"/>
    <circle cx="556" cy="130" r="24" fill="#2563eb" opacity="0.12"/>
    <text x="556" y="138" fill="#2563eb" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">A</text>
    <text x="556" y="170" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Accountability</text>
    <text x="556" y="192" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Assign ownership.</text>
    <text x="556" y="206" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Designate an AI</text>
    <text x="556" y="220" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">champion on the team.</text>
    <text x="556" y="248" fill="#7d8590" font-family="system-ui, sans-serif" font-size="9" font-style="italic" text-anchor="middle">4 hrs/week dedicated</text>
  </g>

  <!-- R Card -->
  <g filter="url(#cardShadow)">
    <rect x="670" y="85" width="192" height="180" rx="12" fill="#0d1117"/>
    <rect x="670" y="85" width="192" height="180" rx="12" stroke="#30363d" stroke-width="1" fill="none"/>
    <rect x="670" y="85" width="192" height="4" rx="2" fill="url(#rGrad)"/>
    <circle cx="766" cy="130" r="24" fill="#e05d22" opacity="0.12"/>
    <text x="766" y="138" fill="#e05d22" font-family="system-ui, sans-serif" font-size="24" font-weight="700" text-anchor="middle">R</text>
    <text x="766" y="170" fill="#e6edf3" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Results</text>
    <text x="766" y="192" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Measure everything.</text>
    <text x="766" y="206" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">Time saved, cost per</text>
    <text x="766" y="220" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10.5" text-anchor="middle">output, quality scores.</text>
    <text x="766" y="248" fill="#7d8590" font-family="system-ui, sans-serif" font-size="9" font-style="italic" text-anchor="middle">Track ROI dashboard</text>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="310" fill="#7d8590" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Each step builds on the previous one. Start with Standardize, end with measurable Results.</text>
</svg>
