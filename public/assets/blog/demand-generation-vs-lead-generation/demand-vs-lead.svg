<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#bgGrad)" rx="24"/>

  <text x="700" y="66" fill="#f0f6fc" font-size="40" font-weight="700" text-anchor="middle">How Demand Generation and Lead Generation Work Together</text>
  <text x="700" y="104" fill="#9ca3af" font-size="22" text-anchor="middle">One motion in four steps. Demand gen fills the market; lead gen harvests it; customers feed the next round.</text>

  <!-- Step 1: Demand gen creates the market -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="150" width="305" height="300" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="50" y="150" width="305" height="6" rx="3" fill="#f5a0a1"/>
    <text x="80" y="200" fill="#f5a0a1" font-size="20" font-weight="700" letter-spacing="0.08em">STEP 1  ·  DEMAND GEN</text>
    <text x="80" y="240" fill="#f0f6fc" font-size="26" font-weight="600">Create the Market</text>
    <text x="80" y="284" fill="#c8cfd8" font-size="22">Ungated content, organic</text>
    <text x="80" y="316" fill="#c8cfd8" font-size="22">reach, and credibility build</text>
    <text x="80" y="348" fill="#c8cfd8" font-size="22">awareness and intent across</text>
    <text x="80" y="380" fill="#c8cfd8" font-size="22">the whole market.</text>
    <text x="80" y="426" fill="#9ca3af" font-size="20">Upstream · reaches the 95%</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <line x1="360" y1="300" x2="395" y2="300" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="390,293 404,300 390,307" fill="#5eead4"/>

  <!-- Step 2: Intent surfaces -->
  <g filter="url(#cardShadow)">
    <rect x="395" y="150" width="305" height="300" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="395" y="150" width="305" height="6" rx="3" fill="#c084fc"/>
    <text x="425" y="200" fill="#c084fc" font-size="20" font-weight="700" letter-spacing="0.08em">STEP 2  ·  INTENT</text>
    <text x="425" y="240" fill="#f0f6fc" font-size="26" font-weight="600">Intent Surfaces</text>
    <text x="425" y="284" fill="#c8cfd8" font-size="22">A subset of that aware</text>
    <text x="425" y="316" fill="#c8cfd8" font-size="22">audience starts actively</text>
    <text x="425" y="348" fill="#c8cfd8" font-size="22">researching, comparing,</text>
    <text x="425" y="380" fill="#c8cfd8" font-size="22">and shortlisting.</text>
    <text x="425" y="426" fill="#9ca3af" font-size="20">In-market buyers emerge</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <line x1="705" y1="300" x2="740" y2="300" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="735,293 749,300 735,307" fill="#5eead4"/>

  <!-- Step 3: Lead gen captures it -->
  <g filter="url(#cardShadow)">
    <rect x="740" y="150" width="305" height="300" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="740" y="150" width="305" height="6" rx="3" fill="#60a5fa"/>
    <text x="770" y="200" fill="#60a5fa" font-size="20" font-weight="700" letter-spacing="0.08em">STEP 3  ·  LEAD GEN</text>
    <text x="770" y="240" fill="#f0f6fc" font-size="26" font-weight="600">Capture It</text>
    <text x="770" y="284" fill="#c8cfd8" font-size="22">Demos, gated high-intent</text>
    <text x="770" y="316" fill="#c8cfd8" font-size="22">assets, and paid search</text>
    <text x="770" y="348" fill="#c8cfd8" font-size="22">convert the ready subset</text>
    <text x="770" y="380" fill="#c8cfd8" font-size="22">into named opportunities.</text>
    <text x="770" y="426" fill="#9ca3af" font-size="20">Downstream · captures the 5%</text>
  </g>

  <!-- Arrow 3 -> 4 -->
  <line x1="1050" y1="300" x2="1085" y2="300" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="1080,293 1094,300 1080,307" fill="#5eead4"/>

  <!-- Step 4: The loop feeds itself -->
  <g filter="url(#cardShadow)">
    <rect x="1085" y="150" width="265" height="300" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="1085" y="150" width="265" height="6" rx="3" fill="#fb923c"/>
    <text x="1115" y="200" fill="#fb923c" font-size="20" font-weight="700" letter-spacing="0.08em">STEP 4  ·  LOOP</text>
    <text x="1115" y="240" fill="#f0f6fc" font-size="26" font-weight="600">Feed the Loop</text>
    <text x="1115" y="284" fill="#c8cfd8" font-size="22">Closed customers and</text>
    <text x="1115" y="316" fill="#c8cfd8" font-size="22">engaged accounts generate</text>
    <text x="1115" y="348" fill="#c8cfd8" font-size="22">proof, referrals, and stories</text>
    <text x="1115" y="380" fill="#c8cfd8" font-size="22">for the next round.</text>
    <text x="1115" y="426" fill="#9ca3af" font-size="20">Fuels more demand gen</text>
  </g>

  <!-- Loop-back connector: Step 4 down, across, up to Step 1 -->
  <line x1="1217" y1="470" x2="1217" y2="560" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="1217" y1="560" x2="202" y2="560" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="202" y1="560" x2="202" y2="470" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="195,485 202,471 209,485" fill="#5eead4"/>

  <text x="700" y="555" fill="#5eead4" font-size="20" font-weight="700" letter-spacing="0.08em" text-anchor="middle">THE LOOP FEEDS ITSELF</text>

  <text x="700" y="640" fill="#9ca3af" font-size="22" text-anchor="middle">Demand gen without lead gen builds a brand competitors close. Lead gen without demand gen</text>
  <text x="700" y="672" fill="#9ca3af" font-size="22" text-anchor="middle">harvests a field nobody is replanting. Run both as one well-sequenced motion.</text>
</svg>
