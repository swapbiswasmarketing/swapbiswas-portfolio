<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Abstract grid pattern -->
  <g opacity="0.08">
    <line x1="200" y1="0" x2="200" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="126" x2="1200" y2="126" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="252" x2="1200" y2="252" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="378" x2="1200" y2="378" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="504" x2="1200" y2="504" stroke="#60a5fa" stroke-width="1"/>
  </g>
  <!-- Floating cards representing battlecard sections -->
  <rect x="80" y="120" width="220" height="140" rx="12" fill="#151b23" stroke="#60a5fa" stroke-width="1.5" opacity="0.9" transform="rotate(-3 190 190)"/>
  <rect x="85" y="125" width="210" height="8" rx="4" fill="#60a5fa" opacity="0.7" transform="rotate(-3 190 190)"/>
  <rect x="100" y="150" width="140" height="8" rx="4" fill="#30363d" transform="rotate(-3 190 190)"/>
  <rect x="100" y="168" width="170" height="6" rx="3" fill="#21262d" transform="rotate(-3 190 190)"/>
  <rect x="100" y="182" width="120" height="6" rx="3" fill="#21262d" transform="rotate(-3 190 190)"/>
  <rect x="100" y="200" width="160" height="20" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" transform="rotate(-3 190 190)"/>
  <rect x="100" y="228" width="80" height="16" rx="8" fill="#60a5fa" opacity="0.3" transform="rotate(-3 190 190)"/>

  <rect x="340" y="80" width="220" height="140" rx="12" fill="#151b23" stroke="#c084fc" stroke-width="1.5" opacity="0.9" transform="rotate(2 450 150)"/>
  <rect x="345" y="85" width="210" height="8" rx="4" fill="#c084fc" opacity="0.7" transform="rotate(2 450 150)"/>
  <rect x="360" y="110" width="140" height="8" rx="4" fill="#30363d" transform="rotate(2 450 150)"/>
  <rect x="360" y="128" width="170" height="6" rx="3" fill="#21262d" transform="rotate(2 450 150)"/>
  <rect x="360" y="142" width="100" height="6" rx="3" fill="#21262d" transform="rotate(2 450 150)"/>
  <rect x="360" y="160" width="160" height="20" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" transform="rotate(2 450 150)"/>
  <rect x="360" y="188" width="80" height="16" rx="8" fill="#c084fc" opacity="0.3" transform="rotate(2 450 150)"/>

  <rect x="580" y="140" width="220" height="140" rx="12" fill="#151b23" stroke="#5eead4" stroke-width="1.5" opacity="0.9" transform="rotate(-1 690 210)"/>
  <rect x="585" y="145" width="210" height="8" rx="4" fill="#5eead4" opacity="0.7" transform="rotate(-1 690 210)"/>
  <rect x="600" y="170" width="140" height="8" rx="4" fill="#30363d" transform="rotate(-1 690 210)"/>
  <rect x="600" y="188" width="170" height="6" rx="3" fill="#21262d" transform="rotate(-1 690 210)"/>
  <rect x="600" y="202" width="130" height="6" rx="3" fill="#21262d" transform="rotate(-1 690 210)"/>
  <rect x="600" y="220" width="160" height="20" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" transform="rotate(-1 690 210)"/>
  <rect x="600" y="248" width="80" height="16" rx="8" fill="#5eead4" opacity="0.3" transform="rotate(-1 690 210)"/>

  <!-- VS badge / shield icon -->
  <circle cx="950" cy="200" r="80" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
  <circle cx="950" cy="200" r="55" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <text x="950" y="195" fill="#60a5fa" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="700" text-anchor="middle" opacity="0.6">VS</text>
  <text x="950" y="225" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="14" text-anchor="middle" opacity="0.5">COMPETE</text>

  <!-- Bottom gradient bar -->
  <rect x="0" y="580" width="1200" height="50" fill="url(#accent)" opacity="0.15"/>

  <!-- Scattered dots -->
  <circle cx="150" cy="400" r="4" fill="#60a5fa" opacity="0.3"/>
  <circle cx="300" cy="450" r="3" fill="#c084fc" opacity="0.25"/>
  <circle cx="500" cy="380" r="5" fill="#fb923c" opacity="0.2"/>
  <circle cx="700" cy="420" r="3" fill="#5eead4" opacity="0.3"/>
  <circle cx="850" cy="370" r="4" fill="#f5a0a1" opacity="0.25"/>
  <circle cx="1050" cy="400" r="3" fill="#d98ee0" opacity="0.2"/>
  <circle cx="1100" cy="150" r="4" fill="#60a5fa" opacity="0.15"/>
  <circle cx="50" cy="50" r="3" fill="#fb923c" opacity="0.2"/>
</svg>