<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)" rx="24"/>

  <text x="700" y="76" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="42" font-weight="700">AI Overview Optimization: 4 Layers That Matter</text>
  <text x="700" y="116" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="22">Google: "There are no additional requirements to appear in AI Overviews." Focus on these four.</text>

  <!-- Card 1: Structural Cleanup -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="170" width="640" height="250" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="170" width="640" height="6" rx="3" fill="#f5a0a1"/>
    <text x="90" y="218" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 1</text>
    <text x="90" y="258" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">Structural Cleanup</text>
    <text x="90" y="302" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; H2s match real questions</text>
    <text x="90" y="336" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; First sentence answers directly</text>
    <text x="90" y="370" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Lists and tables over dense prose</text>
    <text x="90" y="404" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">Write leads like a journalist does.</text>
  </g>

  <!-- Card 2: Answer Completeness -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="170" width="620" height="250" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="170" width="620" height="6" rx="3" fill="#c084fc"/>
    <text x="750" y="218" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 2</text>
    <text x="750" y="258" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">Answer Completeness</text>
    <text x="750" y="302" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Whole answer on one page</text>
    <text x="750" y="336" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Follow-up questions addressed</text>
    <text x="750" y="370" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Primary sources, not aggregators</text>
    <text x="750" y="404" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">Cited pages answer completely in one place.</text>
  </g>

  <!-- Card 3: Entity and Topical Depth -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="445" width="640" height="250" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="445" width="640" height="6" rx="3" fill="#60a5fa"/>
    <text x="90" y="493" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 3</text>
    <text x="90" y="533" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">Entity &amp; Topical Depth</text>
    <text x="90" y="577" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Build topic clusters + hub pages</text>
    <text x="90" y="611" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Use industry-native language</text>
    <text x="90" y="645" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Internal links with natural anchors</text>
    <text x="90" y="679" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">Be clearly expert, not scattered.</text>
  </g>

  <!-- Card 4: E-E-A-T Signals -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="445" width="620" height="250" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="445" width="620" height="6" rx="3" fill="#5eead4"/>
    <text x="750" y="493" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 4</text>
    <text x="750" y="533" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="700">Trust &amp; E-E-A-T</text>
    <text x="750" y="577" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Named authors with credentials</text>
    <text x="750" y="611" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Original research, primary data</text>
    <text x="750" y="645" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Clean sitewide trust signals</text>
    <text x="750" y="679" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">Trust compounds. Tricks do not.</text>
  </g>

  <!-- Footer bar -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="720" width="1280" height="78" rx="16" fill="#1a1f26" stroke="#30363d" stroke-width="1"/>
    <text x="700" y="770" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">
      AI Overviews now reach <tspan fill="#5eead4" font-weight="700">200+ countries</tspan> and
      <tspan fill="#fb923c" font-weight="700">40+ languages</tspan>. Source: Google Search blog, 2025.
    </text>
  </g>
</svg>
