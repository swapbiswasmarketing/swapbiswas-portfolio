<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="scrollBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="legendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="25%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="75%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-size="38" font-weight="700">How to Read 3 Types of Heatmaps</text>

  <!-- ========== Card 1: Click/Tap Map ========== -->
  <g filter="url(#cardShadow)">
    <rect x="68" y="130" width="400" height="550" rx="16" fill="#151b23" stroke="#30363d"/>
    <!-- Accent bar -->
    <rect x="68" y="130" width="400" height="4" rx="2" fill="#f5a0a1"/>

    <!-- Icon area: click dots -->
    <circle cx="180" cy="210" r="18" fill="#f5a0a1" opacity="1.0"/>
    <circle cx="300" cy="230" r="14" fill="#f5a0a1" opacity="0.8"/>
    <circle cx="240" cy="190" r="10" fill="#f5a0a1" opacity="0.5"/>
    <circle cx="330" cy="195" r="8" fill="#f5a0a1" opacity="0.3"/>
    <circle cx="210" cy="250" r="12" fill="#f5a0a1" opacity="0.5"/>
    <circle cx="280" cy="265" r="6" fill="#f5a0a1" opacity="0.8"/>

    <!-- Heading -->
    <text x="268" y="318" text-anchor="middle" fill="#f0f6fc" font-size="24" font-weight="700">Click / Tap Map</text>

    <!-- Separator -->
    <line x1="98" y1="336" x2="438" y2="336" stroke="#30363d" stroke-width="1"/>

    <!-- Measures -->
    <text x="98" y="368" fill="#f5a0a1" font-size="16" font-weight="700">Measures:</text>
    <text x="98" y="390" fill="#c8cfd8" font-size="18">Where users click or tap</text>

    <!-- Best for -->
    <text x="98" y="426" fill="#f5a0a1" font-size="16" font-weight="700">Best for:</text>
    <text x="98" y="448" fill="#c8cfd8" font-size="18">CTA optimization, navigation</text>
    <text x="98" y="470" fill="#c8cfd8" font-size="18">testing</text>

    <!-- Watch for -->
    <text x="98" y="506" fill="#f5a0a1" font-size="16" font-weight="700">Watch for:</text>
    <text x="98" y="528" fill="#c8cfd8" font-size="18">Dead clicks on non-interactive</text>
    <text x="98" y="550" fill="#c8cfd8" font-size="18">elements</text>

    <!-- Min data -->
    <text x="98" y="586" fill="#f5a0a1" font-size="16" font-weight="700">Min. data:</text>
    <text x="98" y="608" fill="#c8cfd8" font-size="18">500 - 1,000 clicks</text>
  </g>

  <!-- ========== Card 2: Scroll Map ========== -->
  <g filter="url(#cardShadow)">
    <rect x="498" y="130" width="400" height="550" rx="16" fill="#151b23" stroke="#30363d"/>
    <!-- Accent bar -->
    <rect x="498" y="130" width="400" height="4" rx="2" fill="#60a5fa"/>

    <!-- Icon area: scroll gradient bar -->
    <rect x="668" y="160" width="60" height="120" rx="6" fill="url(#scrollBar)"/>
    <!-- Fold dashed line -->
    <line x1="648" y1="220" x2="748" y2="220" stroke="#c8cfd8" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="752" y="224" fill="#c8cfd8" font-size="13" font-weight="600">Fold</text>

    <!-- Heading -->
    <text x="698" y="318" text-anchor="middle" fill="#f0f6fc" font-size="24" font-weight="700">Scroll Map</text>

    <!-- Separator -->
    <line x1="528" y1="336" x2="868" y2="336" stroke="#30363d" stroke-width="1"/>

    <!-- Measures -->
    <text x="528" y="368" fill="#60a5fa" font-size="16" font-weight="700">Measures:</text>
    <text x="528" y="390" fill="#c8cfd8" font-size="18">How far users scroll down</text>

    <!-- Best for -->
    <text x="528" y="426" fill="#60a5fa" font-size="16" font-weight="700">Best for:</text>
    <text x="528" y="448" fill="#c8cfd8" font-size="18">Content placement, page length</text>

    <!-- Watch for -->
    <text x="528" y="484" fill="#60a5fa" font-size="16" font-weight="700">Watch for:</text>
    <text x="528" y="506" fill="#c8cfd8" font-size="18">False bottoms that stop</text>
    <text x="528" y="528" fill="#c8cfd8" font-size="18">scrolling</text>

    <!-- Min data -->
    <text x="528" y="564" fill="#60a5fa" font-size="16" font-weight="700">Min. data:</text>
    <text x="528" y="586" fill="#c8cfd8" font-size="18">1,000+ pageviews</text>
  </g>

  <!-- ========== Card 3: Move/Hover Map ========== -->
  <g filter="url(#cardShadow)">
    <rect x="928" y="130" width="400" height="550" rx="16" fill="#151b23" stroke="#30363d"/>
    <!-- Accent bar -->
    <rect x="928" y="130" width="400" height="4" rx="2" fill="#5eead4"/>

    <!-- Icon area: F-pattern -->
    <rect x="1048" y="170" width="180" height="12" rx="3" fill="#5eead4" opacity="1.0"/>
    <rect x="1048" y="200" width="130" height="12" rx="3" fill="#5eead4" opacity="0.7"/>
    <rect x="1048" y="230" width="80" height="12" rx="3" fill="#5eead4" opacity="0.4"/>
    <!-- Vertical stem of F -->
    <rect x="1048" y="170" width="12" height="100" rx="3" fill="#5eead4" opacity="0.5"/>

    <!-- Heading -->
    <text x="1128" y="318" text-anchor="middle" fill="#f0f6fc" font-size="24" font-weight="700">Move / Hover Map</text>

    <!-- Separator -->
    <line x1="958" y1="336" x2="1298" y2="336" stroke="#30363d" stroke-width="1"/>

    <!-- Measures -->
    <text x="958" y="368" fill="#5eead4" font-size="16" font-weight="700">Measures:</text>
    <text x="958" y="390" fill="#c8cfd8" font-size="18">Mouse cursor movement</text>

    <!-- Best for -->
    <text x="958" y="426" fill="#5eead4" font-size="16" font-weight="700">Best for:</text>
    <text x="958" y="448" fill="#c8cfd8" font-size="18">Attention analysis, layout</text>
    <text x="958" y="470" fill="#c8cfd8" font-size="18">checks</text>

    <!-- Watch for -->
    <text x="958" y="506" fill="#5eead4" font-size="16" font-weight="700">Watch for:</text>
    <text x="958" y="528" fill="#c8cfd8" font-size="18">Not a precise eye-tracking</text>
    <text x="958" y="550" fill="#c8cfd8" font-size="18">substitute</text>

    <!-- Min data -->
    <text x="958" y="586" fill="#5eead4" font-size="16" font-weight="700">Min. data:</text>
    <text x="958" y="608" fill="#c8cfd8" font-size="18">1,000+ sessions</text>
  </g>

  <!-- ========== Legend Bar ========== -->
  <rect x="300" y="710" width="800" height="24" rx="12" fill="url(#legendGrad)"/>
  <text x="300" y="758" fill="#f87171" font-size="16" font-weight="600">High Activity</text>
  <text x="1100" y="758" text-anchor="end" fill="#60a5fa" font-size="16" font-weight="600">Low Activity</text>
</svg>