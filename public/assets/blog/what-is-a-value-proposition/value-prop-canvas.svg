<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="720" fill="url(#bg)" rx="24"/>

  <text x="700" y="72" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="40" font-weight="700">The Four Blocks of a Value Proposition</text>
  <text x="700" y="112" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="22">Strong propositions name all four. Weak ones pick three.</text>

  <!-- Card 1 Customer (top-left) -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="160" width="640" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="160" width="640" height="6" rx="3" fill="#f5a0a1"/>
    <text x="90" y="212" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">BLOCK 1</text>
    <text x="90" y="254" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Customer</text>
    <text x="90" y="298" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">Who is this for? Specific role, segment,</text>
    <text x="90" y="328" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">or stage of company.</text>
    <text x="90" y="376" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">"Revenue leaders running a 50+ rep team"</text>
  </g>

  <!-- Card 2 Job (top-right) -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="160" width="620" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="160" width="620" height="6" rx="3" fill="#c084fc"/>
    <text x="750" y="212" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">BLOCK 2</text>
    <text x="750" y="254" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Job</text>
    <text x="750" y="298" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">What are they trying to do? The outcome</text>
    <text x="750" y="328" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">they hire a product to deliver.</text>
    <text x="750" y="376" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">"Know which deals will actually close"</text>
  </g>

  <!-- Card 3 Outcome (bottom-left) -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="425" width="640" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="425" width="640" height="6" rx="3" fill="#60a5fa"/>
    <text x="90" y="477" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">BLOCK 3</text>
    <text x="90" y="519" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Outcome</text>
    <text x="90" y="563" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">What changes when they use you?</text>
    <text x="90" y="593" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">The "before vs after" promise.</text>
    <text x="90" y="641" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">"See in real time which calls are deals"</text>
  </g>

  <!-- Card 4 Differentiator (bottom-right) -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="425" width="620" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="425" width="620" height="6" rx="3" fill="#fb923c"/>
    <text x="750" y="477" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">BLOCK 4</text>
    <text x="750" y="519" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Differentiator</text>
    <text x="750" y="563" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">Why us, not them? The thing competitors</text>
    <text x="750" y="593" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">cannot honestly claim back.</text>
    <text x="750" y="641" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="20" font-style="italic">"AI on every interaction, not just CRM fields"</text>
  </g>

</svg>
