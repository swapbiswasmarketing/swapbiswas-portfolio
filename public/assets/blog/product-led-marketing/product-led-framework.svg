<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="760" fill="url(#bg)" rx="24"/>

  <!-- Title -->
  <text x="700" y="68" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="700">The Product-Led Marketing Framework</text>
  <text x="700" y="106" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI, system-ui, sans-serif" font-size="22">Five layers, worked through in order</text>

  <!-- Card 1: Positioning -->
  <g filter="url(#cardShadow)">
    <rect x="40" y="150" width="240" height="520" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="40" y="150" width="240" height="6" rx="3" fill="#f5a0a1"/>
  <text x="70" y="210" fill="#f5a0a1" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">STEP 1</text>
  <text x="160" y="300" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">
    <tspan x="160" dy="0">Positioning</tspan>
  </text>
  <line x1="70" y1="335" x2="250" y2="335" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="395" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="22">
    <tspan x="160" dy="0">Sets up the</tspan>
    <tspan x="160" dy="34">self-serve</tspan>
    <tspan x="160" dy="34">promise on a</tspan>
    <tspan x="160" dy="34">specific, reachable</tspan>
    <tspan x="160" dy="34">outcome</tspan>
  </text>

  <!-- Card 2: Path to First Value -->
  <g filter="url(#cardShadow)">
    <rect x="320" y="150" width="240" height="520" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="320" y="150" width="240" height="6" rx="3" fill="#60a5fa"/>
  <text x="350" y="210" fill="#60a5fa" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">STEP 2</text>
  <text x="440" y="300" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">
    <tspan x="440" dy="0">Path to</tspan>
    <tspan x="440" dy="34">First Value</tspan>
  </text>
  <line x1="350" y1="370" x2="530" y2="370" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="22">
    <tspan x="440" dy="0">Reach the</tspan>
    <tspan x="440" dy="34">activation event</tspan>
    <tspan x="440" dy="34">fast; cut every</tspan>
    <tspan x="440" dy="34">step that isn't</tspan>
    <tspan x="440" dy="34">load-bearing</tspan>
  </text>

  <!-- Card 3: In-Product Messaging -->
  <g filter="url(#cardShadow)">
    <rect x="600" y="150" width="240" height="520" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="600" y="150" width="240" height="6" rx="3" fill="#c084fc"/>
  <text x="630" y="210" fill="#c084fc" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">STEP 3</text>
  <text x="720" y="300" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">
    <tspan x="720" dy="0">In-Product</tspan>
    <tspan x="720" dy="34">Messaging</tspan>
  </text>
  <line x1="630" y1="370" x2="810" y2="370" stroke="#30363d" stroke-width="1"/>
  <text x="720" y="430" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="22">
    <tspan x="720" dy="0">Empty states,</tspan>
    <tspan x="720" dy="34">tooltips and</tspan>
    <tspan x="720" dy="34">prompts treated</tspan>
    <tspan x="720" dy="34">like landing</tspan>
    <tspan x="720" dy="34">pages</tspan>
  </text>

  <!-- Card 4: Loops -->
  <g filter="url(#cardShadow)">
    <rect x="880" y="150" width="240" height="520" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="880" y="150" width="240" height="6" rx="3" fill="#5eead4"/>
  <text x="910" y="210" fill="#5eead4" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">STEP 4</text>
  <text x="1000" y="300" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">
    <tspan x="1000" dy="0">Growth</tspan>
    <tspan x="1000" dy="34">Loops</tspan>
  </text>
  <line x1="910" y1="370" x2="1090" y2="370" stroke="#30363d" stroke-width="1"/>
  <text x="1000" y="430" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="22">
    <tspan x="1000" dy="0">Viral, output</tspan>
    <tspan x="1000" dy="34">and gravity</tspan>
    <tspan x="1000" dy="34">loops that turn</tspan>
    <tspan x="1000" dy="34">usage into new</tspan>
    <tspan x="1000" dy="34">acquisition</tspan>
  </text>

  <!-- Card 5: PQLs & Hand-Off -->
  <g filter="url(#cardShadow)">
    <rect x="1160" y="150" width="240" height="520" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  </g>
  <rect x="1160" y="150" width="240" height="6" rx="3" fill="#fb923c"/>
  <text x="1190" y="210" fill="#fb923c" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">STEP 5</text>
  <text x="1280" y="300" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="28" font-weight="600">
    <tspan x="1280" dy="0">PQLs &amp;</tspan>
    <tspan x="1280" dy="34">Hand-Off</tspan>
  </text>
  <line x1="1190" y1="370" x2="1370" y2="370" stroke="#30363d" stroke-width="1"/>
  <text x="1280" y="430" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, system-ui, sans-serif" font-size="22">
    <tspan x="1280" dy="0">In-product</tspan>
    <tspan x="1280" dy="34">behavior signals</tspan>
    <tspan x="1280" dy="34">a warm,</tspan>
    <tspan x="1280" dy="34">informed pass</tspan>
    <tspan x="1280" dy="34">to sales</tspan>
  </text>

  <!-- Sequential arrows (teal) in the gaps between cards -->
  <!-- between card 1 and 2 -->
  <line x1="286" y1="230" x2="308" y2="230" stroke="#5eead4" stroke-width="3"/>
  <polygon points="306,222 320,230 306,238" fill="#5eead4"/>
  <!-- between card 2 and 3 -->
  <line x1="566" y1="230" x2="588" y2="230" stroke="#5eead4" stroke-width="3"/>
  <polygon points="586,222 600,230 586,238" fill="#5eead4"/>
  <!-- between card 3 and 4 -->
  <line x1="846" y1="230" x2="868" y2="230" stroke="#5eead4" stroke-width="3"/>
  <polygon points="866,222 880,230 866,238" fill="#5eead4"/>
  <!-- between card 4 and 5 -->
  <line x1="1126" y1="230" x2="1148" y2="230" stroke="#5eead4" stroke-width="3"/>
  <polygon points="1146,222 1160,230 1146,238" fill="#5eead4"/>
</svg>