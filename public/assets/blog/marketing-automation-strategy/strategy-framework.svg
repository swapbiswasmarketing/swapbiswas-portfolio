<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="520" fill="url(#bg)" rx="24"/>

  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">Marketing Automation Strategy Framework</text>
  <text x="700" y="94" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">6 steps from audit to optimization</text>

  <!-- Row 1: Steps 1-3 -->
  <rect x="40" y="130" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="130" width="420" height="5" rx="3" fill="#5eead4"/>
  <text x="70" y="172" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 1</text>
  <text x="70" y="200" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Audit Your Stack</text>
  <text x="70" y="228" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Map tools, integrations &amp; gaps</text>

  <!-- Arrow 1->2 -->
  <line x1="460" y1="190" x2="480" y2="190" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="478,183 492,190 478,197" fill="#5eead4"/>

  <rect x="490" y="130" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="490" y="130" width="420" height="5" rx="3" fill="#fb923c"/>
  <text x="520" y="172" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 2</text>
  <text x="520" y="200" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Map the Journey</text>
  <text x="520" y="228" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Define stages, triggers &amp; content</text>

  <!-- Arrow 2->3 -->
  <line x1="910" y1="190" x2="930" y2="190" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="928,183 942,190 928,197" fill="#5eead4"/>

  <rect x="940" y="130" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="940" y="130" width="420" height="5" rx="3" fill="#c084fc"/>
  <text x="970" y="172" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 3</text>
  <text x="970" y="200" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Identify Opportunities</text>
  <text x="970" y="228" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Find high-impact automation wins</text>

  <!-- Arrow 3->4 (row transition) -->
  <line x1="1150" y1="250" x2="1150" y2="280" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="1150" y1="280" x2="250" y2="280" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="250" y1="280" x2="250" y2="310" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="243,308 250,322 257,308" fill="#5eead4"/>

  <!-- Row 2: Steps 4-6 -->
  <rect x="40" y="320" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="320" width="420" height="5" rx="3" fill="#60a5fa"/>
  <text x="70" y="362" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 4</text>
  <text x="70" y="390" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Choose Your Platform</text>
  <text x="70" y="418" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Match tool to team size &amp; budget</text>

  <!-- Arrow 4->5 -->
  <line x1="460" y1="380" x2="480" y2="380" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="478,373 492,380 478,387" fill="#5eead4"/>

  <rect x="490" y="320" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="490" y="320" width="420" height="5" rx="3" fill="#f5a0a1"/>
  <text x="520" y="362" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 5</text>
  <text x="520" y="390" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Build Core Workflows</text>
  <text x="520" y="418" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Welcome, scoring &amp; re-engagement</text>

  <!-- Arrow 5->6 -->
  <line x1="910" y1="380" x2="930" y2="380" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="928,373 942,380 928,387" fill="#5eead4"/>

  <rect x="940" y="320" width="420" height="120" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="940" y="320" width="420" height="5" rx="3" fill="#d98ee0"/>
  <text x="970" y="362" fill="#d98ee0" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">STEP 6</text>
  <text x="970" y="390" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600">Set KPIs &amp; Measure</text>
  <text x="970" y="418" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">Track ROI, conversions &amp; engagement</text>

  <text x="700" y="490" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="16">Start with Steps 1-3 in Month 1 · Build in Month 2 · Optimize in Month 3</text>
</svg>
