<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)" rx="24"/>

  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">2x2 Positioning Map Example</text>
  <text x="700" y="94" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">Project management tools plotted by ease-of-use vs feature depth</text>

  <!-- Axes -->
  <line x1="200" y1="130" x2="200" y2="500" stroke="#30363d" stroke-width="2"/>
  <line x1="200" y1="500" x2="1200" y2="500" stroke="#30363d" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="700" y="535" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">FEATURE DEPTH →</text>
  <text x="160" y="320" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600" transform="rotate(-90,160,320)">EASE OF USE →</text>

  <!-- Quadrant labels -->
  <text x="320" y="165" text-anchor="middle" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Simple + Light</text>
  <text x="1050" y="165" text-anchor="middle" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Easy + Powerful</text>
  <text x="320" y="480" text-anchor="middle" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Limited + Complex</text>
  <text x="1100" y="490" text-anchor="middle" fill="#30363d" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Powerful + Complex</text>

  <!-- Midlines -->
  <line x1="700" y1="130" x2="700" y2="500" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="200" y1="315" x2="1200" y2="315" stroke="#30363d" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Notion - top left (easy, fewer features) -->
  <circle cx="420" cy="240" r="65" fill="#151b23" stroke="#c084fc" stroke-width="2.5"/>
  <text x="420" y="235" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">Notion</text>
  <text x="420" y="258" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">Docs + wiki</text>

  <!-- Asana - top right (easy, more features) -->
  <circle cx="820" cy="220" r="65" fill="#151b23" stroke="#5eead4" stroke-width="2.5"/>
  <text x="820" y="215" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">Asana</text>
  <text x="820" y="238" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">PM + integrations</text>

  <!-- Monday.com - middle right (moderate ease, more features) -->
  <circle cx="920" cy="340" r="65" fill="#151b23" stroke="#fb923c" stroke-width="2.5"/>
  <text x="920" y="332" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700">Monday</text>
  <text x="920" y="355" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">Work platform</text>

  <!-- ClickUp - bottom right (complex, most features) -->
  <circle cx="940" cy="420" r="65" fill="#151b23" stroke="#f5a0a1" stroke-width="2.5"/>
  <text x="940" y="415" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700">ClickUp</text>
  <text x="940" y="438" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="12">All-in-one</text>

  <!-- Open space callout -->
  <rect x="280" y="350" width="280" height="80" rx="12" fill="#151b23" stroke="#d98ee0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="420" y="382" text-anchor="middle" fill="#d98ee0" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">OPEN SPACE</text>
  <text x="420" y="405" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14">Simple + deep specialization</text>
</svg>
