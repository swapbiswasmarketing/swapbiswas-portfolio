<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="620" fill="url(#bg)" rx="24"/>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">B2C Automation Workflows by Priority</text>
  <text x="700" y="92" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">Build these in order - each one compounds revenue</text>

  <!-- Priority label -->
  <text x="40" y="140" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600" letter-spacing="0.08em">HIGHEST ROI</text>
  <line x1="160" y1="136" x2="1360" y2="136" stroke="#30363d" stroke-width="1"/>

  <!-- Card 1: Welcome Series -->
  <rect x="40" y="160" width="250" height="400" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="160" width="250" height="5" rx="3" fill="#f5a0a1"/>
  <circle cx="80" cy="210" r="22" fill="#3b2020" stroke="#f5a0a1" stroke-width="1.5"/>
  <text x="80" y="218" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">1</text>
  <text x="115" y="218" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">Welcome Series</text>
  <line x1="65" y1="240" x2="265" y2="240" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="272" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">
    <tspan x="70" dy="0">3-5 emails over 7-14 days</tspan>
  </text>
  <text x="70" y="315" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="16">
    <tspan x="70" dy="0">Immediate: Brand story + CTA</tspan>
    <tspan x="70" dy="26">Day 2-3: Bestsellers</tspan>
    <tspan x="70" dy="26">Day 5-7: Social proof</tspan>
    <tspan x="70" dy="26">Day 10-14: Offer expiry</tspan>
  </text>
  <rect x="55" y="480" width="220" height="48" rx="10" fill="#3b2020" stroke="#f5a0a1" stroke-width="1"/>
  <text x="165" y="510" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">HIGHEST ENGAGEMENT</text>

  <!-- Arrow 1 to 2 -->
  <line x1="290" y1="340" x2="310" y2="340" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="308,333 322,340 308,347" fill="#5eead4"/>

  <!-- Card 2: Cart Recovery -->
  <rect x="320" y="160" width="250" height="400" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="320" y="160" width="250" height="5" rx="3" fill="#fb923c"/>
  <circle cx="360" cy="210" r="22" fill="#2a1a0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="360" y="218" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">2</text>
  <text x="395" y="218" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">Cart Recovery</text>
  <line x1="345" y1="240" x2="545" y2="240" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="272" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">
    <tspan x="350" dy="0">3-email sequence</tspan>
  </text>
  <text x="350" y="315" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="16">
    <tspan x="350" dy="0">1 hour: Cart reminder</tspan>
    <tspan x="350" dy="26">24 hours: Social proof</tspan>
    <tspan x="350" dy="26">48-72 hours: Incentive</tspan>
  </text>
  <rect x="335" y="480" width="220" height="48" rx="10" fill="#2a1a0a" stroke="#fb923c" stroke-width="1"/>
  <text x="445" y="510" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">HIGHEST ROI</text>

  <!-- Arrow 2 to 3 -->
  <line x1="570" y1="340" x2="590" y2="340" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="588,333 602,340 588,347" fill="#5eead4"/>

  <!-- Card 3: Post-Purchase -->
  <rect x="600" y="160" width="250" height="400" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="600" y="160" width="250" height="5" rx="3" fill="#5eead4"/>
  <circle cx="640" cy="210" r="22" fill="#1a2a2a" stroke="#5eead4" stroke-width="1.5"/>
  <text x="640" y="218" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">3</text>
  <text x="675" y="218" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">Post-Purchase</text>
  <line x1="625" y1="240" x2="825" y2="240" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="272" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">
    <tspan x="630" dy="0">Retention-focused flows</tspan>
  </text>
  <text x="630" y="315" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="16">
    <tspan x="630" dy="0">Cross-sell recommendations</tspan>
    <tspan x="630" dy="26">Review request (day 5-7)</tspan>
    <tspan x="630" dy="26">Replenishment reminder</tspan>
    <tspan x="630" dy="26">Win-back (30-90 days)</tspan>
  </text>
  <rect x="615" y="480" width="220" height="48" rx="10" fill="#1a2a2a" stroke="#5eead4" stroke-width="1"/>
  <text x="725" y="510" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">HIGHEST LTV IMPACT</text>

  <!-- Arrow 3 to 4 -->
  <line x1="850" y1="340" x2="870" y2="340" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="868,333 882,340 868,347" fill="#5eead4"/>

  <!-- Card 4: Browse Abandonment -->
  <rect x="880" y="160" width="240" height="400" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="880" y="160" width="240" height="5" rx="3" fill="#60a5fa"/>
  <circle cx="920" cy="210" r="22" fill="#1a2a3a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="920" y="218" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">4</text>
  <text x="955" y="218" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">Browse</text>
  <line x1="905" y1="240" x2="1095" y2="240" stroke="#30363d" stroke-width="1"/>
  <text x="910" y="272" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">
    <tspan x="910" dy="0">View but no cart add</tspan>
  </text>
  <text x="910" y="315" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="16">
    <tspan x="910" dy="0">Lower conversion but</tspan>
    <tspan x="910" dy="26">much larger audience</tspan>
    <tspan x="910" dy="26">than cart abandonment</tspan>
  </text>
  <rect x="895" y="480" width="210" height="48" rx="10" fill="#1a2a3a" stroke="#60a5fa" stroke-width="1"/>
  <text x="1000" y="510" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">LARGEST REACH</text>

  <!-- Arrow 4 to 5 -->
  <line x1="1120" y1="340" x2="1140" y2="340" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="1138,333 1152,340 1138,347" fill="#5eead4"/>

  <!-- Card 5: SMS + Push -->
  <rect x="1150" y="160" width="210" height="400" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="1150" y="160" width="210" height="5" rx="3" fill="#c084fc"/>
  <circle cx="1190" cy="210" r="22" fill="#2a1a3a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1190" y="218" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700">5</text>
  <text x="1225" y="218" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="600">SMS + Push</text>
  <line x1="1175" y1="240" x2="1335" y2="240" stroke="#30363d" stroke-width="1"/>
  <text x="1180" y="272" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="17">
    <tspan x="1180" dy="0">90-98% open rates</tspan>
  </text>
  <text x="1180" y="315" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="16">
    <tspan x="1180" dy="0">Flash sales</tspan>
    <tspan x="1180" dy="26">Back-in-stock alerts</tspan>
    <tspan x="1180" dy="26">Delivery updates</tspan>
    <tspan x="1180" dy="26">Cart follow-ups</tspan>
  </text>
  <rect x="1165" y="480" width="180" height="48" rx="10" fill="#2a1a3a" stroke="#c084fc" stroke-width="1"/>
  <text x="1255" y="510" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">TIME-SENSITIVE</text>

</svg>
