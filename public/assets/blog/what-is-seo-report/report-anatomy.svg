<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-size="38" font-weight="700">Anatomy of an SEO Report</text>
  <text x="700" y="96" text-anchor="middle" fill="#9ca3af" font-size="24">9 Essential Sections for Actionable Reporting</text>

  <!-- Row 1 -->
  <!-- Card 1: Executive Summary -->
  <g filter="url(#shadow)">
    <rect x="85" y="130" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="125" cy="172" r="18" fill="none" stroke="#f5a0a1" stroke-width="2"/>
    <text x="125" y="178" text-anchor="middle" fill="#f5a0a1" font-size="18" font-weight="700">1</text>
    <text x="155" y="178" fill="#f0f6fc" font-size="22" font-weight="600">Executive Summary</text>
    <text x="125" y="216" fill="#c8cfd8" font-size="17">3-5 key takeaways and next steps</text>
  </g>

  <!-- Card 2: Organic Traffic -->
  <g filter="url(#shadow)">
    <rect x="505" y="130" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="545" cy="172" r="18" fill="none" stroke="#c084fc" stroke-width="2"/>
    <text x="545" y="178" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="700">2</text>
    <text x="575" y="178" fill="#f0f6fc" font-size="22" font-weight="600">Organic Traffic</text>
    <text x="545" y="216" fill="#c8cfd8" font-size="17">Sessions, users, trends vs. prior period</text>
  </g>

  <!-- Card 3: Keyword Rankings -->
  <g filter="url(#shadow)">
    <rect x="925" y="130" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="965" cy="172" r="18" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <text x="965" y="178" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700">3</text>
    <text x="995" y="178" fill="#f0f6fc" font-size="22" font-weight="600">Keyword Rankings</text>
    <text x="965" y="216" fill="#c8cfd8" font-size="17">Tracked keywords, movers, new entries</text>
  </g>

  <!-- Row 2 -->
  <!-- Card 4: Search Visibility -->
  <g filter="url(#shadow)">
    <rect x="85" y="330" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="125" cy="372" r="18" fill="none" stroke="#fb923c" stroke-width="2"/>
    <text x="125" y="378" text-anchor="middle" fill="#fb923c" font-size="18" font-weight="700">4</text>
    <text x="155" y="378" fill="#f0f6fc" font-size="22" font-weight="600">Search Visibility</text>
    <text x="125" y="416" fill="#c8cfd8" font-size="17">Impressions, clicks, CTR, avg. position</text>
  </g>

  <!-- Card 5: Backlink Profile -->
  <g filter="url(#shadow)">
    <rect x="505" y="330" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="545" cy="372" r="18" fill="none" stroke="#5eead4" stroke-width="2"/>
    <text x="545" y="378" text-anchor="middle" fill="#5eead4" font-size="18" font-weight="700">5</text>
    <text x="575" y="378" fill="#f0f6fc" font-size="22" font-weight="600">Backlink Profile</text>
    <text x="545" y="416" fill="#c8cfd8" font-size="17">New/lost referring domains, top links</text>
  </g>

  <!-- Card 6: Technical Health -->
  <g filter="url(#shadow)">
    <rect x="925" y="330" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="965" cy="372" r="18" fill="none" stroke="#d98ee0" stroke-width="2"/>
    <text x="965" y="378" text-anchor="middle" fill="#d98ee0" font-size="18" font-weight="700">6</text>
    <text x="995" y="378" fill="#f0f6fc" font-size="22" font-weight="600">Technical Health</text>
    <text x="965" y="416" fill="#c8cfd8" font-size="17">Core Web Vitals, crawl errors, speed</text>
  </g>

  <!-- Row 3 -->
  <!-- Card 7: Conversions & Revenue -->
  <g filter="url(#shadow)">
    <rect x="85" y="530" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="125" cy="572" r="18" fill="none" stroke="#b388f2" stroke-width="2"/>
    <text x="125" y="578" text-anchor="middle" fill="#b388f2" font-size="18" font-weight="700">7</text>
    <text x="155" y="578" fill="#f0f6fc" font-size="22" font-weight="600">Conversions &amp; Revenue</text>
    <text x="125" y="616" fill="#c8cfd8" font-size="17">Organic-attributed goals and revenue</text>
  </g>

  <!-- Card 8: Competitor Snapshot -->
  <g filter="url(#shadow)">
    <rect x="505" y="530" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="545" cy="572" r="18" fill="none" stroke="#f87171" stroke-width="2"/>
    <text x="545" y="578" text-anchor="middle" fill="#f87171" font-size="18" font-weight="700">8</text>
    <text x="575" y="578" fill="#f0f6fc" font-size="22" font-weight="600">Competitor Snapshot</text>
    <text x="545" y="616" fill="#c8cfd8" font-size="17">Share-of-voice, notable competitor moves</text>
  </g>

  <!-- Card 9: Actions & Next Steps -->
  <g filter="url(#shadow)">
    <rect x="925" y="530" width="390" height="170" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <circle cx="965" cy="572" r="18" fill="none" stroke="#60a5fa" stroke-width="2"/>
    <text x="965" y="578" text-anchor="middle" fill="#60a5fa" font-size="18" font-weight="700">9</text>
    <text x="995" y="578" fill="#f0f6fc" font-size="22" font-weight="600">Actions &amp; Next Steps</text>
    <text x="965" y="616" fill="#c8cfd8" font-size="17">Prioritized recommendations, status updates</text>
  </g>
</svg>