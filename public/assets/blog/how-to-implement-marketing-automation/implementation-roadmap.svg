<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="760" fill="url(#bgGrad)" rx="24"/>

  <text x="700" y="70" fill="#f0f6fc" font-size="40" font-weight="700" text-anchor="middle">Marketing Automation Implementation Roadmap</text>
  <text x="700" y="108" fill="#9ca3af" font-size="22" text-anchor="middle">Six phases to a working system in 90 days</text>

  <!-- Row 1 -->
  <!-- Phase 1: Data Foundation -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="150" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="50" y="150" width="6" height="220" rx="3" fill="#f5a0a1"/>
    <text x="80" y="190" fill="#f5a0a1" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 1  ·  WEEK 1-2</text>
    <text x="80" y="232" fill="#f0f6fc" font-size="28" font-weight="600">Data Foundation</text>
    <text x="80" y="278" fill="#c8cfd8" font-size="22">Audit, clean, and standardize</text>
    <text x="80" y="306" fill="#c8cfd8" font-size="22">contact data. Define fields,</text>
    <text x="80" y="334" fill="#c8cfd8" font-size="22">CRM sync, consent rules.</text>
  </g>

  <!-- Arrow 1 -> 2 -->
  <line x1="455" y1="260" x2="495" y2="260" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="490,253 504,260 490,267" fill="#5eead4"/>

  <!-- Phase 2: Lifecycle Map -->
  <g filter="url(#cardShadow)">
    <rect x="500" y="150" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="500" y="150" width="6" height="220" rx="3" fill="#d98ee0"/>
    <text x="530" y="190" fill="#d98ee0" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 2  ·  WEEK 2-3</text>
    <text x="530" y="232" fill="#f0f6fc" font-size="28" font-weight="600">Lifecycle Map</text>
    <text x="530" y="278" fill="#c8cfd8" font-size="22">Document every stage and the</text>
    <text x="530" y="306" fill="#c8cfd8" font-size="22">trigger between them. One</text>
    <text x="530" y="334" fill="#c8cfd8" font-size="22">sentence per rule, max.</text>
  </g>

  <!-- Arrow 2 -> 3 -->
  <line x1="905" y1="260" x2="945" y2="260" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="940,253 954,260 940,267" fill="#5eead4"/>

  <!-- Phase 3: Core Workflows -->
  <g filter="url(#cardShadow)">
    <rect x="950" y="150" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="950" y="150" width="6" height="220" rx="3" fill="#c084fc"/>
    <text x="980" y="190" fill="#c084fc" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 3  ·  WEEK 3-6</text>
    <text x="980" y="232" fill="#f0f6fc" font-size="28" font-weight="600">Core Workflows</text>
    <text x="980" y="278" fill="#c8cfd8" font-size="22">Welcome, scoring, MQL handoff,</text>
    <text x="980" y="306" fill="#c8cfd8" font-size="22">one nurture, re-engagement.</text>
    <text x="980" y="334" fill="#c8cfd8" font-size="22">Five workflows, no more.</text>
  </g>

  <!-- Arrow 3 -> 4 (row transition: down, left, down) -->
  <line x1="1150" y1="375" x2="1150" y2="400" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="1150" y1="400" x2="250" y2="400" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="250" y1="400" x2="250" y2="425" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="243,420 250,434 257,420" fill="#5eead4"/>

  <!-- Row 2 -->
  <!-- Phase 4: Channel Integrations -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="440" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="50" y="440" width="6" height="220" rx="3" fill="#60a5fa"/>
    <text x="80" y="480" fill="#60a5fa" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 4  ·  WEEK 6-8</text>
    <text x="80" y="522" fill="#f0f6fc" font-size="28" font-weight="600">Channel Integrations</text>
    <text x="80" y="568" fill="#c8cfd8" font-size="22">Forms, webinars, paid media,</text>
    <text x="80" y="596" fill="#c8cfd8" font-size="22">product events, webhooks.</text>
    <text x="80" y="624" fill="#c8cfd8" font-size="22">Every channel feeds the model.</text>
  </g>

  <!-- Arrow 4 -> 5 -->
  <line x1="455" y1="550" x2="495" y2="550" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="490,543 504,550 490,557" fill="#5eead4"/>

  <!-- Phase 5: Reporting -->
  <g filter="url(#cardShadow)">
    <rect x="500" y="440" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="500" y="440" width="6" height="220" rx="3" fill="#5eead4"/>
    <text x="530" y="480" fill="#5eead4" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 5  ·  WEEK 8-10</text>
    <text x="530" y="522" fill="#f0f6fc" font-size="28" font-weight="600">Reporting</text>
    <text x="530" y="568" fill="#c8cfd8" font-size="22">Three dashboards: workflow</text>
    <text x="530" y="596" fill="#c8cfd8" font-size="22">health, pipeline impact, and</text>
    <text x="530" y="624" fill="#c8cfd8" font-size="22">revenue attribution.</text>
  </g>

  <!-- Arrow 5 -> 6 -->
  <line x1="905" y1="550" x2="945" y2="550" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="940,543 954,550 940,557" fill="#5eead4"/>

  <!-- Phase 6: Operating Cadence -->
  <g filter="url(#cardShadow)">
    <rect x="950" y="440" width="400" height="220" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="950" y="440" width="6" height="220" rx="3" fill="#fb923c"/>
    <text x="980" y="480" fill="#fb923c" font-size="20" font-weight="700" letter-spacing="0.08em">PHASE 6  ·  ONGOING</text>
    <text x="980" y="522" fill="#f0f6fc" font-size="28" font-weight="600">Operating Cadence</text>
    <text x="980" y="568" fill="#c8cfd8" font-size="22">Weekly health, monthly impact,</text>
    <text x="980" y="596" fill="#c8cfd8" font-size="22">quarterly audit. The system</text>
    <text x="980" y="624" fill="#c8cfd8" font-size="22">stays alive only if humans look.</text>
  </g>

  <text x="700" y="710" fill="#9ca3af" font-size="20" text-anchor="middle">Skip a phase and the system either never goes live - or quietly rots within six months.</text>
</svg>
