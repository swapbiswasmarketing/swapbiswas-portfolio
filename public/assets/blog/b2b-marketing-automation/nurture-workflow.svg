<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 580">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="580" fill="url(#bg)" rx="24"/>

  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">Inbound Lead Nurture Workflow</text>
  <text x="700" y="94" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">Automated sequence with branching logic</text>

  <!-- Trigger -->
  <rect x="540" y="120" width="320" height="60" rx="30" fill="#1a2a2a" stroke="#5eead4" stroke-width="2"/>
  <text x="700" y="158" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="20" font-weight="600">TRIGGER: Content Download</text>

  <!-- Arrow down -->
  <line x1="700" y1="180" x2="700" y2="210" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="693,208 700,222 707,208" fill="#5eead4"/>

  <!-- Email sequence -->
  <rect x="100" y="220" width="240" height="70" rx="12" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <text x="120" y="252" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">DAY 0</text>
  <text x="120" y="274" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="16">Deliver content + welcome</text>

  <line x1="340" y1="255" x2="370" y2="255" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="368,248 382,255 368,262" fill="#5eead4"/>

  <rect x="380" y="220" width="240" height="70" rx="12" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="252" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">DAY 2</text>
  <text x="400" y="274" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="16">Related blog post</text>

  <line x1="620" y1="255" x2="650" y2="255" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="648,248 662,255 648,262" fill="#5eead4"/>

  <rect x="660" y="220" width="240" height="70" rx="12" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="252" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">DAY 5</text>
  <text x="680" y="274" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="16">Industry case study</text>

  <line x1="900" y1="255" x2="930" y2="255" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="928,248 942,255 928,262" fill="#5eead4"/>

  <rect x="940" y="220" width="240" height="70" rx="12" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <text x="960" y="252" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700">DAY 10</text>
  <text x="960" y="274" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="16">Webinar or demo invite</text>

  <!-- Branch point - pricing page -->
  <line x1="700" y1="290" x2="700" y2="330" stroke="#5eead4" stroke-width="2.5"/>

  <rect x="520" y="330" width="360" height="60" rx="30" fill="#2a1a0a" stroke="#fb923c" stroke-width="2"/>
  <text x="700" y="368" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="18" font-weight="600">Visits pricing page?</text>

  <!-- YES branch -->
  <line x1="880" y1="360" x2="960" y2="360" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="960" y1="360" x2="960" y2="420" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="953,418 960,432 967,418" fill="#5eead4"/>
  <text x="920" y="350" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">YES</text>

  <rect x="860" y="430" width="280" height="70" rx="12" fill="#151b23" stroke="#5eead4" stroke-width="2"/>
  <text x="1000" y="460" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Skip to demo request</text>
  <text x="1000" y="482" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="14">Alert sales immediately</text>

  <!-- NO branch -->
  <line x1="520" y1="360" x2="440" y2="360" stroke="#5eead4" stroke-width="2.5"/>
  <line x1="440" y1="360" x2="440" y2="420" stroke="#5eead4" stroke-width="2.5"/>
  <polygon points="433,418 440,432 447,418" fill="#5eead4"/>
  <text x="478" y="350" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600">NO</text>

  <rect x="200" y="430" width="480" height="85" rx="12" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="460" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Day 15: Check lead score</text>
  <text x="440" y="482" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="13">Above threshold: route to sales</text>
  <text x="440" y="500" text-anchor="middle" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="13">Below threshold: continue nurture</text>

  <text x="700" y="555" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="16">Pricing page visit is the strongest buying signal - always fast-track it</text>
</svg>
