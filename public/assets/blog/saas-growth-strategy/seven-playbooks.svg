  <text x="164" y="192" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">1</text>
  <text x="164" y="218" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Product-Led</text>
  <text x="164" y="242" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Growth</text>
  <text x="164" y="272" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14">Freemium / free trial</text>

  <rect x="308" y="155" width="248" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
