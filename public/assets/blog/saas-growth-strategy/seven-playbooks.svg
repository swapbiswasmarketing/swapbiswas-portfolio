  <text x="935" y="422" text-anchor="middle" fill="#b388f2" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">7</text>
  <text x="935" y="448" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="21" font-weight="600">Vertical Specialization</text>
  <text x="935" y="478" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="16">Industry-specific deep focus</text>
  <text x="935" y="502" text-anchor="middle" fill="#b388f2" font-family="Segoe UI, sans-serif" font-size="14">Higher WTP, lower competition</text>

  <text x="700" y="580" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="16">Pre-PMF: Pick 1 playbook · Growth: Add a 2nd · Scale: Run 3-4 simultaneously</text>
</svg>
