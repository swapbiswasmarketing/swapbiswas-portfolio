  <text x="700" y="365" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">RETENTION &amp; EXPANSION</text>

  <!-- Row 2: 2 retention playbooks -->
  <rect x="265" y="385" width="400" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="265" y="385" width="400" height="5" rx="3" fill="#d98ee0"/>
  <text x="465" y="422" text-anchor="middle" fill="#d98ee0" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">6</text>
  <text x="465" y="448" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="21" font-weight="600">Customer Expansion</text>
  <text x="465" y="478" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="16">Upsells, cross-sells &amp; seat growth</text>
  <text x="465" y="502" text-anchor="middle" fill="#d98ee0" font-family="Segoe UI, sans-serif" font-size="14">58-67% of new ARR at scale</text>

  <rect x="735" y="385" width="400" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
