  <!-- ACQUISITION label -->
  <text x="700" y="135" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">ACQUISITION</text>

  <!-- Row 1: 5 acquisition playbooks -->
  <rect x="40" y="155" width="248" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
