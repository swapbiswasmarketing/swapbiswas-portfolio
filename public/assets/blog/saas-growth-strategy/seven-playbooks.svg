  <text x="432" y="192" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">2</text>
  <text x="432" y="218" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Content-Led</text>
  <text x="432" y="242" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">SEO</text>
  <text x="432" y="272" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14">Organic search engine</text>

  <rect x="576" y="155" width="248" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="576" y="155" width="248" height="5" rx="3" fill="#c084fc"/>
  <text x="700" y="192" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">3</text>
  <text x="700" y="218" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Outbound</text>
  <text x="700" y="242" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Sales</text>
  <text x="700" y="272" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14">Enterprise direct sales</text>

  <rect x="844" y="155" width="248" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="844" y="155" width="248" height="5" rx="3" fill="#60a5fa"/>
  <text x="968" y="192" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">4</text>
  <text x="968" y="218" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Community-Led</text>
  <text x="968" y="242" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Growth</text>
  <text x="968" y="272" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="14">User-driven distribution</text>

  <rect x="1112" y="155" width="248" height="140" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="1112" y="155" width="248" height="5" rx="3" fill="#f5a0a1"/>
  <text x="1236" y="192" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700">5</text>
  <text x="1236" y="218" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Partnership</text>
