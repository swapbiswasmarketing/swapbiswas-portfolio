<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="520" fill="url(#bg)" rx="24"/>

  <text x="700" y="62" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">Three PLG Growth Loop Types</text>
  <text x="700" y="94" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">Every PLG company runs one of these loops</text>

  <!-- Loop 1: Viral Invite -->
  <rect x="40" y="130" width="420" height="340" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="40" y="130" width="420" height="5" rx="3" fill="#5eead4"/>
  <text x="250" y="172" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">VIRAL INVITE LOOP</text>

  <!-- Loop steps -->
  <rect x="140" y="195" width="220" height="45" rx="10" fill="#1a2a2a" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="224" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">User joins product</text>

  <line x1="250" y1="240" x2="250" y2="258" stroke="#5eead4" stroke-width="2"/>
  <polygon points="243,256 250,268 257,256" fill="#5eead4"/>

  <rect x="140" y="268" width="220" height="45" rx="10" fill="#1a2a2a" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="297" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">Invites teammates</text>

  <line x1="250" y1="313" x2="250" y2="331" stroke="#5eead4" stroke-width="2"/>
  <polygon points="243,329 250,341 257,329" fill="#5eead4"/>

  <rect x="140" y="341" width="220" height="45" rx="10" fill="#1a2a2a" stroke="#5eead4" stroke-width="1.5"/>
  <text x="250" y="370" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">Team invites others</text>

  <!-- Curved return arrow (simplified) -->
  <line x1="360" y1="363" x2="390" y2="363" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="390" y1="363" x2="390" y2="217" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="390" y1="217" x2="362" y2="217" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="364,211 356,217 364,223" fill="#5eead4"/>

  <text x="250" y="418" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Slack · Miro · Figma</text>
  <text x="250" y="445" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">Product requires collaboration</text>

  <!-- Loop 2: Shareable Output -->
  <rect x="490" y="130" width="420" height="340" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="490" y="130" width="420" height="5" rx="3" fill="#fb923c"/>
  <text x="700" y="172" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">SHAREABLE OUTPUT LOOP</text>

  <rect x="590" y="195" width="220" height="45" rx="10" fill="#2a1a0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="700" y="224" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">User creates content</text>

  <line x1="700" y1="240" x2="700" y2="258" stroke="#5eead4" stroke-width="2"/>
  <polygon points="693,256 700,268 707,256" fill="#5eead4"/>

  <rect x="590" y="268" width="220" height="45" rx="10" fill="#2a1a0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="700" y="297" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">Shares with recipients</text>

  <line x1="700" y1="313" x2="700" y2="331" stroke="#5eead4" stroke-width="2"/>
  <polygon points="693,329 700,341 707,329" fill="#5eead4"/>

  <rect x="590" y="341" width="220" height="45" rx="10" fill="#2a1a0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="700" y="370" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">Recipients sign up</text>

  <line x1="810" y1="363" x2="840" y2="363" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="840" y1="363" x2="840" y2="217" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="840" y1="217" x2="812" y2="217" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="814,211 806,217 814,223" fill="#fb923c"/>

  <text x="700" y="418" text-anchor="middle" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">Loom · Calendly · Notion</text>
  <text x="700" y="445" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">Output is the distribution channel</text>

  <!-- Loop 3: Data Gravity -->
  <rect x="940" y="130" width="420" height="340" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="940" y="130" width="420" height="5" rx="3" fill="#c084fc"/>
  <text x="1150" y="172" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">DATA GRAVITY LOOP</text>

  <rect x="1040" y="195" width="220" height="45" rx="10" fill="#2a1a3a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1150" y="224" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">User stores data</text>

  <line x1="1150" y1="240" x2="1150" y2="258" stroke="#5eead4" stroke-width="2"/>
  <polygon points="1143,256 1150,268 1157,256" fill="#5eead4"/>

  <rect x="1040" y="268" width="220" height="45" rx="10" fill="#2a1a3a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1150" y="297" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">Switching cost grows</text>

  <line x1="1150" y1="313" x2="1150" y2="331" stroke="#5eead4" stroke-width="2"/>
  <polygon points="1143,329 1150,341 1157,329" fill="#5eead4"/>

  <rect x="1040" y="341" width="220" height="45" rx="10" fill="#2a1a3a" stroke="#c084fc" stroke-width="1.5"/>
  <text x="1150" y="370" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="16">User upgrades</text>

  <line x1="1260" y1="363" x2="1290" y2="363" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1290" y1="363" x2="1290" y2="217" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="1290" y1="217" x2="1262" y2="217" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="1264,211 1256,217 1264,223" fill="#c084fc"/>

  <text x="1150" y="418" text-anchor="middle" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="19" font-weight="600">HubSpot · Dropbox · Canva</text>
  <text x="1150" y="445" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="15">Data lock-in drives retention</text>

  <text x="700" y="500" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, sans-serif" font-size="16">Identify which loop your product naturally supports and build around it</text>
</svg>
