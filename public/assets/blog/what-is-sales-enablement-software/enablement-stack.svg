<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="720" fill="url(#bgGrad)" rx="24"/>

  <text x="700" y="68" fill="#f0f6fc" font-size="40" font-weight="700" text-anchor="middle">The Sales Enablement Software Stack</text>
  <text x="700" y="106" fill="#9ca3af" font-size="22" text-anchor="middle">Five tool categories. Most teams need two well, not all five poorly.</text>

  <!-- Category 1: Content Management -->
  <g filter="url(#cardShadow)">
    <rect x="50" y="150" width="240" height="500" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="50" y="150" width="240" height="6" rx="3" fill="#f5a0a1"/>
    <text x="170" y="200" fill="#f5a0a1" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CATEGORY 1</text>
    <text x="170" y="240" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Content</text>
    <text x="170" y="266" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Management</text>
    <line x1="80" y1="294" x2="260" y2="294" stroke="#30363d" stroke-width="1"/>
    <text x="170" y="324" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">EXAMPLES</text>
    <text x="170" y="352" fill="#c8cfd8" font-size="20" text-anchor="middle">Highspot</text>
    <text x="170" y="378" fill="#c8cfd8" font-size="20" text-anchor="middle">Seismic</text>
    <text x="170" y="404" fill="#c8cfd8" font-size="20" text-anchor="middle">Showpad, Guru</text>
    <line x1="80" y1="430" x2="260" y2="430" stroke="#30363d" stroke-width="1"/>
    <text x="170" y="460" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">KEY FEATURES</text>
    <text x="170" y="490" fill="#9ca3af" font-size="19" text-anchor="middle">AI search, tagging,</text>
    <text x="170" y="514" fill="#9ca3af" font-size="19" text-anchor="middle">buyer-side analytics,</text>
    <text x="170" y="538" fill="#9ca3af" font-size="19" text-anchor="middle">version control,</text>
    <text x="170" y="562" fill="#9ca3af" font-size="19" text-anchor="middle">CMS integrations</text>
    <text x="170" y="615" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="600">Core of every stack</text>
  </g>

  <!-- Category 2: Training & Readiness -->
  <g filter="url(#cardShadow)">
    <rect x="315" y="150" width="240" height="500" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="315" y="150" width="240" height="6" rx="3" fill="#c084fc"/>
    <text x="435" y="200" fill="#c084fc" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CATEGORY 2</text>
    <text x="435" y="240" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Training +</text>
    <text x="435" y="266" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Readiness</text>
    <line x1="345" y1="294" x2="525" y2="294" stroke="#30363d" stroke-width="1"/>
    <text x="435" y="324" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">EXAMPLES</text>
    <text x="435" y="352" fill="#c8cfd8" font-size="20" text-anchor="middle">Mindtickle</text>
    <text x="435" y="378" fill="#c8cfd8" font-size="20" text-anchor="middle">Brainshark</text>
    <text x="435" y="404" fill="#c8cfd8" font-size="20" text-anchor="middle">Allego, Lessonly</text>
    <line x1="345" y1="430" x2="525" y2="430" stroke="#30363d" stroke-width="1"/>
    <text x="435" y="460" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">KEY FEATURES</text>
    <text x="435" y="490" fill="#9ca3af" font-size="19" text-anchor="middle">Course authoring,</text>
    <text x="435" y="514" fill="#9ca3af" font-size="19" text-anchor="middle">AI role-play grading,</text>
    <text x="435" y="538" fill="#9ca3af" font-size="19" text-anchor="middle">certifications,</text>
    <text x="435" y="562" fill="#9ca3af" font-size="19" text-anchor="middle">ramp analytics</text>
    <text x="435" y="615" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="600">Cuts ramp time</text>
  </g>

  <!-- Category 3: Conversation Intelligence -->
  <g filter="url(#cardShadow)">
    <rect x="580" y="150" width="240" height="500" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="580" y="150" width="240" height="6" rx="3" fill="#60a5fa"/>
    <text x="700" y="200" fill="#60a5fa" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CATEGORY 3</text>
    <text x="700" y="240" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Conversation</text>
    <text x="700" y="266" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Intelligence</text>
    <line x1="610" y1="294" x2="790" y2="294" stroke="#30363d" stroke-width="1"/>
    <text x="700" y="324" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">EXAMPLES</text>
    <text x="700" y="352" fill="#c8cfd8" font-size="20" text-anchor="middle">Gong</text>
    <text x="700" y="378" fill="#c8cfd8" font-size="20" text-anchor="middle">Chorus (ZoomInfo)</text>
    <text x="700" y="404" fill="#c8cfd8" font-size="20" text-anchor="middle">Salesloft Conv.</text>
    <line x1="610" y1="430" x2="790" y2="430" stroke="#30363d" stroke-width="1"/>
    <text x="700" y="460" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">KEY FEATURES</text>
    <text x="700" y="490" fill="#9ca3af" font-size="19" text-anchor="middle">Live transcription,</text>
    <text x="700" y="514" fill="#9ca3af" font-size="19" text-anchor="middle">deal-risk scoring,</text>
    <text x="700" y="538" fill="#9ca3af" font-size="19" text-anchor="middle">in-call battlecards,</text>
    <text x="700" y="562" fill="#9ca3af" font-size="19" text-anchor="middle">coaching moments</text>
    <text x="700" y="615" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="600">Coaching at scale</text>
  </g>

  <!-- Category 4: Sales Engagement -->
  <g filter="url(#cardShadow)">
    <rect x="845" y="150" width="240" height="500" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="845" y="150" width="240" height="6" rx="3" fill="#5eead4"/>
    <text x="965" y="200" fill="#5eead4" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CATEGORY 4</text>
    <text x="965" y="240" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Sales</text>
    <text x="965" y="266" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Engagement</text>
    <line x1="875" y1="294" x2="1055" y2="294" stroke="#30363d" stroke-width="1"/>
    <text x="965" y="324" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">EXAMPLES</text>
    <text x="965" y="352" fill="#c8cfd8" font-size="20" text-anchor="middle">Salesloft</text>
    <text x="965" y="378" fill="#c8cfd8" font-size="20" text-anchor="middle">Outreach</text>
    <text x="965" y="404" fill="#c8cfd8" font-size="20" text-anchor="middle">Apollo.io, HubSpot</text>
    <line x1="875" y1="430" x2="1055" y2="430" stroke="#30363d" stroke-width="1"/>
    <text x="965" y="460" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">KEY FEATURES</text>
    <text x="965" y="490" fill="#9ca3af" font-size="19" text-anchor="middle">Sequence builder,</text>
    <text x="965" y="514" fill="#9ca3af" font-size="19" text-anchor="middle">dialer, A/B testing,</text>
    <text x="965" y="538" fill="#9ca3af" font-size="19" text-anchor="middle">CRM bi-directional</text>
    <text x="965" y="562" fill="#9ca3af" font-size="19" text-anchor="middle">sync, automation</text>
    <text x="965" y="615" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="600">Outbound execution</text>
  </g>

  <!-- Category 5: Digital Sales Rooms -->
  <g filter="url(#cardShadow)">
    <rect x="1110" y="150" width="240" height="500" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="1110" y="150" width="240" height="6" rx="3" fill="#fb923c"/>
    <text x="1230" y="200" fill="#fb923c" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="0.08em">CATEGORY 5</text>
    <text x="1230" y="240" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Digital Sales</text>
    <text x="1230" y="266" fill="#f0f6fc" font-size="22" font-weight="600" text-anchor="middle">Rooms</text>
    <line x1="1140" y1="294" x2="1320" y2="294" stroke="#30363d" stroke-width="1"/>
    <text x="1230" y="324" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">EXAMPLES</text>
    <text x="1230" y="352" fill="#c8cfd8" font-size="20" text-anchor="middle">GetAccept</text>
    <text x="1230" y="378" fill="#c8cfd8" font-size="20" text-anchor="middle">Aligned, DealHub</text>
    <text x="1230" y="404" fill="#c8cfd8" font-size="20" text-anchor="middle">Trumpet, Recapped</text>
    <line x1="1140" y1="430" x2="1320" y2="430" stroke="#30363d" stroke-width="1"/>
    <text x="1230" y="460" fill="#5eead4" font-size="18" text-anchor="middle" font-weight="600">KEY FEATURES</text>
    <text x="1230" y="490" fill="#9ca3af" font-size="19" text-anchor="middle">Branded buyer rooms,</text>
    <text x="1230" y="514" fill="#9ca3af" font-size="19" text-anchor="middle">mutual action plans,</text>
    <text x="1230" y="538" fill="#9ca3af" font-size="19" text-anchor="middle">e-signature,</text>
    <text x="1230" y="562" fill="#9ca3af" font-size="19" text-anchor="middle">engagement analytics</text>
    <text x="1230" y="615" fill="#fb923c" font-size="18" text-anchor="middle" font-weight="600">Buyer-side workflow</text>
  </g>
</svg>
