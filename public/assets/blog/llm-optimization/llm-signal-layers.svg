<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1400" height="720" fill="url(#bg)" rx="24"/>

  <text x="700" y="72" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="40" font-weight="700">LLM Optimization: The Four Signal Layers</text>
  <text x="700" y="112" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI, sans-serif" font-size="22">What ChatGPT, Perplexity, Claude, and Gemini look for before citing a page.</text>

  <!-- Layer 1 Retrieval -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="160" width="640" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="160" width="640" height="6" rx="3" fill="#f5a0a1"/>
    <text x="90" y="212" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 1</text>
    <text x="90" y="254" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Retrieval</text>
    <text x="90" y="298" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Indexed in Google and Bing</text>
    <text x="90" y="332" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Crawlers allowed (GPTBot, PerplexityBot)</text>
    <text x="90" y="366" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Page speed and clean canonicals</text>
  </g>

  <!-- Layer 2 Clarity -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="160" width="620" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="160" width="620" height="6" rx="3" fill="#c084fc"/>
    <text x="750" y="212" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 2</text>
    <text x="750" y="254" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Clarity (chunkability)</text>
    <text x="750" y="298" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; H2s match real questions</text>
    <text x="750" y="332" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; First sentence answers directly</text>
    <text x="750" y="366" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Short paragraphs, lists, tables</text>
  </g>

  <!-- Layer 3 Authority -->
  <g filter="url(#cardShadow)">
    <rect x="60" y="425" width="640" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="60" y="425" width="640" height="6" rx="3" fill="#60a5fa"/>
    <text x="90" y="477" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 3</text>
    <text x="90" y="519" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Authority</text>
    <text x="90" y="563" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Real author byline + schema</text>
    <text x="90" y="597" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Outbound links to primary sources</text>
    <text x="90" y="631" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Topical depth across 5-10 pages</text>
  </g>

  <!-- Layer 4 Freshness -->
  <g filter="url(#cardShadow)">
    <rect x="720" y="425" width="620" height="240" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
    <rect x="720" y="425" width="620" height="6" rx="3" fill="#5eead4"/>
    <text x="750" y="477" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700" letter-spacing="0.08em">LAYER 4</text>
    <text x="750" y="519" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="30" font-weight="700">Freshness</text>
    <text x="750" y="563" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Visible publishDate and updatedDate</text>
    <text x="750" y="597" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Year in title for time-sensitive queries</text>
    <text x="750" y="631" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="22">&#8226; Stats and pricing refreshed annually</text>
  </g>

</svg>
