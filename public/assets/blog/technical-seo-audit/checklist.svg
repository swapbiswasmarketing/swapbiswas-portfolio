<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="820" fill="url(#bg)" rx="24"/>

  <!-- Title -->
  <text x="700" y="52" text-anchor="middle" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="38" font-weight="700">Technical SEO Audit: 8-Step Checklist</text>
  <text x="700" y="84" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, sans-serif" font-size="21">Prioritized by impact on rankings</text>

  <!-- ROW 1: Steps 1-4 -->
  <!-- Step 1: Crawlability -->
  <rect x="30" y="115" width="320" height="290" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="30" y="115" width="320" height="5" rx="3" fill="#f5a0a1"/>
  <text x="60" y="160" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 1</text>
  <text x="60" y="198" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Crawlability</text>
  <text x="60" y="240" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="60" dy="0">robots.txt review</tspan>
    <tspan x="60" dy="32">XML sitemap validation</tspan>
    <tspan x="60" dy="32">Crawl budget analysis</tspan>
  </text>
  <rect x="60" y="350" width="90" height="30" rx="15" fill="#3b1a1a"/>
  <text x="105" y="370" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="17" font-weight="600">Critical</text>

  <!-- Arrow 1→2 -->
  <line x1="350" y1="260" x2="375" y2="260" stroke="#484f58" stroke-width="2"/>
  <polygon points="373,255 383,260 373,265" fill="#484f58"/>

  <!-- Step 2: Indexability -->
  <rect x="385" y="115" width="310" height="290" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="385" y="115" width="310" height="5" rx="3" fill="#fb923c"/>
  <text x="415" y="160" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 2</text>
  <text x="415" y="198" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Indexability</text>
  <text x="415" y="240" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="415" dy="0">Index coverage in GSC</tspan>
    <tspan x="415" dy="32">Canonical tag verification</tspan>
    <tspan x="415" dy="32">Meta robots check</tspan>
  </text>
  <rect x="415" y="350" width="90" height="30" rx="15" fill="#3b1a1a"/>
  <text x="460" y="370" text-anchor="middle" fill="#f5a0a1" font-family="Segoe UI, sans-serif" font-size="17" font-weight="600">Critical</text>

  <!-- Arrow 2→3 -->
  <line x1="695" y1="260" x2="720" y2="260" stroke="#484f58" stroke-width="2"/>
  <polygon points="718,255 728,260 718,265" fill="#484f58"/>

  <!-- Step 3: Architecture -->
  <rect x="730" y="115" width="310" height="290" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="730" y="115" width="310" height="5" rx="3" fill="#5eead4"/>
  <text x="760" y="160" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 3</text>
  <text x="760" y="198" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Architecture</text>
  <text x="760" y="240" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="760" dy="0">Click depth under 3</tspan>
    <tspan x="760" dy="32">Internal linking audit</tspan>
    <tspan x="760" dy="32">URL structure review</tspan>
  </text>
  <rect x="760" y="350" width="120" height="30" rx="15" fill="#1a2a1a"/>
  <text x="820" y="370" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="17" font-weight="600">High Impact</text>

  <!-- Arrow 3→4 -->
  <line x1="1040" y1="260" x2="1065" y2="260" stroke="#484f58" stroke-width="2"/>
  <polygon points="1063,255 1073,260 1063,265" fill="#484f58"/>

  <!-- Step 4: Page Speed -->
  <rect x="1075" y="115" width="295" height="290" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="1075" y="115" width="295" height="5" rx="3" fill="#fb923c"/>
  <text x="1105" y="160" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 4</text>
  <text x="1105" y="198" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Page Speed</text>
  <text x="1105" y="240" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="1105" dy="0">Core Web Vitals</tspan>
    <tspan x="1105" dy="32">LCP / INP / CLS</tspan>
    <tspan x="1105" dy="32">Image optimization</tspan>
  </text>
  <rect x="1105" y="350" width="120" height="30" rx="15" fill="#1a2a1a"/>
  <text x="1165" y="370" text-anchor="middle" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="17" font-weight="600">High Impact</text>

  <!-- Curved arrow from row 1 to row 2 -->
  <path d="M1370,405 C1380,440 1380,460 1370,490 L1370,490 C1360,510 1340,520 1320,520 L100,520 C80,520 60,510 50,490" stroke="#484f58" stroke-width="2" fill="none"/>
  <polygon points="45,495 50,483 55,495" fill="#484f58"/>

  <!-- ROW 2: Steps 5-8 -->
  <!-- Step 5: Mobile Usability -->
  <rect x="30" y="525" width="320" height="260" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="30" y="525" width="320" height="5" rx="3" fill="#60a5fa"/>
  <text x="60" y="570" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 5</text>
  <text x="60" y="608" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Mobile Usability</text>
  <text x="60" y="650" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="60" dy="0">Lighthouse mobile audit</tspan>
    <tspan x="60" dy="32">Responsive breakpoints</tspan>
  </text>
  <text x="60" y="745" fill="#c084fc" font-family="Segoe UI, sans-serif" font-size="19">71% of search is mobile</text>

  <!-- Arrow 5→6 -->
  <line x1="350" y1="655" x2="375" y2="655" stroke="#484f58" stroke-width="2"/>
  <polygon points="373,650 383,655 373,660" fill="#484f58"/>

  <!-- Step 6: HTTPS & Security -->
  <rect x="385" y="525" width="310" height="260" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="385" y="525" width="310" height="5" rx="3" fill="#d98ee0"/>
  <text x="415" y="570" fill="#d98ee0" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 6</text>
  <text x="415" y="608" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">HTTPS &amp; Security</text>
  <text x="415" y="650" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="415" dy="0">SSL certificate check</tspan>
    <tspan x="415" dy="32">Mixed content / 301 redirects</tspan>
  </text>
  <text x="415" y="745" fill="#fb923c" font-family="Segoe UI, sans-serif" font-size="19">Use 301, not 302</text>

  <!-- Arrow 6→7 -->
  <line x1="695" y1="655" x2="720" y2="655" stroke="#484f58" stroke-width="2"/>
  <polygon points="718,650 728,655 718,660" fill="#484f58"/>

  <!-- Step 7: Structured Data -->
  <rect x="730" y="525" width="310" height="260" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="730" y="525" width="310" height="5" rx="3" fill="#60a5fa"/>
  <text x="760" y="570" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 7</text>
  <text x="760" y="608" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Structured Data</text>
  <text x="760" y="650" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="760" dy="0">Schema markup (JSON-LD)</tspan>
    <tspan x="760" dy="32">Rich Results Test validation</tspan>
  </text>
  <text x="760" y="745" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="19">~70% of sites missing this</text>

  <!-- Arrow 7→8 -->
  <line x1="1040" y1="655" x2="1065" y2="655" stroke="#484f58" stroke-width="2"/>
  <polygon points="1063,650 1073,655 1063,660" fill="#484f58"/>

  <!-- Step 8: Links & Redirects -->
  <rect x="1075" y="525" width="295" height="260" rx="16" fill="#151b23" stroke="#30363d" stroke-width="1"/>
  <rect x="1075" y="525" width="295" height="5" rx="3" fill="#60a5fa"/>
  <text x="1105" y="570" fill="#60a5fa" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" font-style="italic">STEP 8</text>
  <text x="1105" y="608" fill="#f0f6fc" font-family="Segoe UI, sans-serif" font-size="28" font-weight="600">Links &amp; Redirects</text>
  <text x="1105" y="650" fill="#c8cfd8" font-family="Segoe UI, sans-serif" font-size="21">
    <tspan x="1105" dy="0">Broken links (404s)</tspan>
    <tspan x="1105" dy="32">Redirect chain cleanup</tspan>
  </text>
  <text x="1105" y="745" fill="#5eead4" font-family="Segoe UI, sans-serif" font-size="19">Zero broken internal links</text>
</svg>