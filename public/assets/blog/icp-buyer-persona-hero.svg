<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="accent-right" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f5a0a1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Abstract connection lines -->
  <g opacity="0.06">
    <path d="M600 0 L600 630" stroke="#c8cfd8" stroke-width="2" stroke-dasharray="8 8"/>
    <path d="M0 315 L1200 315" stroke="#c8cfd8" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Left side: ICP (Company) -->
  <!-- Building/company icon abstraction -->
  <rect x="120" y="140" width="340" height="350" rx="20" fill="#151b23" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>

  <!-- Company building shape -->
  <rect x="220" y="200" width="140" height="180" rx="4" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <rect x="240" y="220" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.15"/>
  <rect x="285" y="220" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.15"/>
  <rect x="330" y="220" width="16" height="30" rx="2" fill="#60a5fa" opacity="0.1"/>
  <rect x="240" y="265" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.12"/>
  <rect x="285" y="265" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.12"/>
  <rect x="330" y="265" width="16" height="30" rx="2" fill="#60a5fa" opacity="0.08"/>
  <rect x="240" y="310" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.1"/>
  <rect x="285" y="310" width="30" height="30" rx="2" fill="#60a5fa" opacity="0.1"/>
  <rect x="270" y="350" width="40" height="30" rx="2" fill="#60a5fa" opacity="0.2"/>

  <!-- ICP data points -->
  <rect x="150" y="420" width="90" height="24" rx="12" fill="#60a5fa" opacity="0.15"/>
  <text x="195" y="437" fill="#60a5fa" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">INDUSTRY</text>
  <rect x="250" y="420" width="70" height="24" rx="12" fill="#5eead4" opacity="0.15"/>
  <text x="285" y="437" fill="#5eead4" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">SIZE</text>
  <rect x="330" y="420" width="100" height="24" rx="12" fill="#fb923c" opacity="0.15"/>
  <text x="380" y="437" fill="#fb923c" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">REVENUE</text>
  <rect x="180" y="455" width="100" height="24" rx="12" fill="#f5a0a1" opacity="0.15"/>
  <text x="230" y="472" fill="#f5a0a1" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">TECH STACK</text>
  <rect x="290" y="455" width="100" height="24" rx="12" fill="#b388f2" opacity="0.15"/>
  <text x="340" y="472" fill="#b388f2" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">GEOGRAPHY</text>

  <!-- Right side: Persona (Person) -->
  <rect x="740" y="140" width="340" height="350" rx="20" fill="#151b23" stroke="#c084fc" stroke-width="1.5" opacity="0.6"/>

  <!-- Person silhouette abstraction -->
  <circle cx="910" cy="240" r="45" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.4"/>
  <path d="M860 340 Q860 300 910 295 Q960 300 960 340 L960 380 L860 380 Z" fill="none" stroke="#c084fc" stroke-width="2" opacity="0.3"/>

  <!-- Persona data points -->
  <rect x="770" y="420" width="70" height="24" rx="12" fill="#c084fc" opacity="0.15"/>
  <text x="805" y="437" fill="#c084fc" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">GOALS</text>
  <rect x="850" y="420" width="70" height="24" rx="12" fill="#d98ee0" opacity="0.15"/>
  <text x="885" y="437" fill="#d98ee0" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">PAINS</text>
  <rect x="930" y="420" width="120" height="24" rx="12" fill="#f87171" opacity="0.15"/>
  <text x="990" y="437" fill="#f87171" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">OBJECTIONS</text>
  <rect x="790" y="455" width="110" height="24" rx="12" fill="#fb923c" opacity="0.15"/>
  <text x="845" y="472" fill="#fb923c" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">MOTIVATIONS</text>
  <rect x="910" y="455" width="100" height="24" rx="12" fill="#5eead4" opacity="0.15"/>
  <text x="960" y="472" fill="#5eead4" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">BEHAVIOR</text>

  <!-- Center connector -->
  <circle cx="600" cy="315" r="35" fill="#151b23" stroke="#30363d" stroke-width="2"/>
  <text x="600" y="312" fill="#f0f6fc" font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">VS</text>
  <text x="600" y="332" fill="#9ca3af" font-family="Segoe UI, system-ui, sans-serif" font-size="10" text-anchor="middle">TOGETHER</text>

  <!-- Connecting arrows -->
  <path d="M460 315 L565 315" stroke="#60a5fa" stroke-width="2" opacity="0.4" marker-end="none"/>
  <path d="M635 315 L740 315" stroke="#c084fc" stroke-width="2" opacity="0.4" marker-end="none"/>

  <!-- Scattered dots -->
  <circle cx="80" cy="100" r="3" fill="#60a5fa" opacity="0.2"/>
  <circle cx="550" cy="80" r="4" fill="#c084fc" opacity="0.15"/>
  <circle cx="1100" cy="120" r="3" fill="#5eead4" opacity="0.2"/>
  <circle cx="100" cy="550" r="4" fill="#fb923c" opacity="0.15"/>
  <circle cx="650" cy="560" r="3" fill="#f5a0a1" opacity="0.2"/>
  <circle cx="1080" cy="530" r="4" fill="#d98ee0" opacity="0.15"/>

  <!-- Bottom gradient bar -->
  <rect x="0" y="600" width="600" height="30" fill="url(#accent-left)" opacity="0.1"/>
  <rect x="600" y="600" width="600" height="30" fill="url(#accent-right)" opacity="0.1"/>
</svg>